        bearerToken: ${{ secrets.JIRA_API_TOKEN }}
        data: |
            {
               "fields": {
                  "customfield_12311140": "${{ env.JIRA_EPIC_LINK }}"
              }
            }
        method: PUT
    - name: Show Jira task CAPI API Responses
      run: |
        echo "Response Status (create, update-epic): ${{ steps.jira-capi.outputs.status }}, ${{ steps.jira-epic-capi.outputs.status }}"
        echo "Response create Data: ${{ steps.jira-capi.outputs.response }}"
        echo "Response update-epic Data: ${{ steps.jira-epic-capi.outputs.response }}"
    - name: Create Jira task CAPZ
      id: jira-capz
      if: ${{ steps.sync.outputs.updated_cluster-api-provider-azure == 'true' && steps.check-branch-exists-capz.outputs.exists == 'false' }}
      uses: fjogeleit/http-request-action@v1
      with:
        url: "${{ env.JIRA_BASE_URL }}/rest/api/2/issue/"
        bearerToken: ${{ secrets.JIRA_API_TOKEN }}
        data: |
            {
               "fields": {
                  "project":
                  {
                     "key": "${{ env.JIRA_PROJECT }}"
                  },
                  "summary": "[cluster-api-installer/CAPZ@${{inputs.dst-branch}}] Please review the PR ${{ steps.cpr-capz.outputs.pull-request-number }}",
                  "description": "[cluster-api-installer/CAPZ@${{inputs.dst-branch}}] Update report - review request ${{ steps.cpr-capz.outputs.pull-request-url }}",
                  "issuetype": {
                     "name": "Task"
                  }
              }
            }
        method: POST
    - name: Update epic in Jira task CAPZ
      id: jira-epic-capz
      if: ${{ steps.jira-capz.outputs.status == '201' && fromJson(steps.jira-capz.outputs.response).id != '' }}
      uses: fjogeleit/http-request-action@v1
      with:
        url: "${{ env.JIRA_BASE_URL }}/rest/api/2/issue/${{fromJson(steps.jira-capz.outputs.response).id}}"
        bearerToken: ${{ secrets.JIRA_API_TOKEN }}
        data: |
            {
               "fields": {
                  "customfield_12311140": "${{ env.JIRA_EPIC_LINK }}"
              }
            }
        method: PUT
    - name: Show Jira task CAPZ API Responses
      run: |
        echo "Response Status (create, update-epic): ${{ steps.jira-capz.outputs.status }}, ${{ steps.jira-epic-capz.outputs.status }}"
        echo "Response create Data: ${{ steps.jira-capz.outputs.response }}"
        echo "Response update-epic Data: ${{ steps.jira-epic-capz.outputs.response }}"
    - name: Create Jira task CAPOA
      id: jira-capoa
      if: ${{ steps.sync.outputs.updated_cluster-api-provider-openshift-assisted == 'true' && steps.check-branch-exists-capoa.outputs.exists == 'false' }}
      uses: fjogeleit/http-request-action@v1
      with:
        url: "${{ env.JIRA_BASE_URL }}/rest/api/2/issue/"
        bearerToken: ${{ secrets.JIRA_API_TOKEN }}
        data: |
            {
               "fields": {
                  "project":
                  {
                     "key": "${{ env.JIRA_PROJECT }}"
                  },
                  "summary": "[cluster-api-installer/CAPOA@${{inputs.dst-branch}}] Please review the PR ${{ steps.cpr-capoa.outputs.pull-request-number }}",
                  "description": "[cluster-api-installer/CAPOA@${{inputs.dst-branch}}] Update report - review request ${{ steps.cpr-capoa.outputs.pull-request-url }}",
                  "issuetype": {
                     "name": "Task"
                  }
              }
            }
        method: POST
    - name: Update epic in Jira task CAPOA
      id: jira-epic-capoa
      if: ${{ steps.jira-capoa.outputs.status == '201' && fromJson(steps.jira-capoa.outputs.response).id != '' }}
      uses: fjogeleit/http-request-action@v1
      with:
        url: "${{ env.JIRA_BASE_URL }}/rest/api/2/issue/${{fromJson(steps.jira-capoa.outputs.response).id}}"
