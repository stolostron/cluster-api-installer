      if: ${{ steps.sync.outputs.updated_cluster-api-provider-metal3 == 'true' && steps.check-branch-exists-metal3.outputs.exists == 'false' }}
      uses: fjogeleit/http-request-action@v1
      with:
        url: "${{ env.JIRA_BASE_URL }}/rest/api/2/issue/"
        bearerToken: ${{ secrets.JIRA_API_TOKEN }}
        data: |
            {
               "fields": {
                  "project":
                  {
                     "key": "${{ env.JIRA_PROJECT }}"
                  },
                  "summary": "[cluster-api-installer/Metal3@${{inputs.dst-branch}}] Please review the PR ${{ steps.cpr-metal3.outputs.pull-request-number }}",
                  "description": "[cluster-api-installer/Metal3@${{inputs.dst-branch}}] Update report - review request ${{ steps.cpr-metal3.outputs.pull-request-url }}",
