{{- if and .Values.tls.enabled .Values.tls.create }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tls.secretName }}
  labels:
    {{- include "aro-mockup-proxy.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: {{ .Values.tls.issuerName | default "selfsigned-issuer" }}
    kind: {{ .Values.tls.issuerKind | default "Issuer" }}
  dnsNames:
    - {{ include "aro-mockup-proxy.fullname" . }}
    - {{ include "aro-mockup-proxy.fullname" . }}.{{ .Release.Namespace }}
    - {{ include "aro-mockup-proxy.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "aro-mockup-proxy.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
  {{- with .Values.tls.additionalDnsNames }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
