apiVersion: v1
kind: Service
metadata:
  name: {{ include "aro-mockup-proxy.fullname" . }}
  labels:
    {{- include "aro-mockup-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "aro-mockup-proxy.selectorLabels" . | nindent 4 }}
