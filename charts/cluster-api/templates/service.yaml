apiVersion: v1
kind: Service
metadata:
  labels:
    cluster.x-k8s.io/provider: cluster-api
    {{- with .Values.clusterApiLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  name: capi-webhook-service
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - port: 443
      targetPort: webhook-server
  selector:
    cluster.x-k8s.io/provider: cluster-api
