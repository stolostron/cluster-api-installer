apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: mce-label-injector-issuer
  namespace: default
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mce-label-injector
  namespace: default
spec:
  dnsNames:
  - mce-label-injector-service.default.svc
  - mce-label-injector-service.default.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: mce-label-injector-issuer
  secretName: mce-label-injector-certs
