---
# ASO reference to the pre-existing MSI resource group.
# detach-on-delete ensures ASO adopts but never deletes the Azure resource.
apiVersion: resources.azure.com/v1api20200601
kind: ResourceGroup
metadata:
  name: ${MSI_RESOURCEGROUPNAME}
  namespace: ${NAMESPACE}
  annotations:
    serviceoperator.azure.com/reconcile-policy: detach-on-delete
spec:
  location: ${REGION}
---
apiVersion: managedidentity.azure.com/v1api20230131
kind: UserAssignedIdentity
metadata:
  name: ${MI_CONTROL_PLANE}
  annotations:
    serviceoperator.azure.com/reconcile-policy: detach-on-delete
  namespace: ${NAMESPACE}
spec:
  location: ${REGION}
  owner:
    name: ${MSI_RESOURCEGROUPNAME}
  operatorSpec:
    configMaps:
      principalId:
        name: identity-map-${MI_CONTROL_PLANE}
        key: principalId
      clientId:
        name: identity-map-${MI_CONTROL_PLANE}
        key: clientId
---
