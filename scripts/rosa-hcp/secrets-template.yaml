# # Cluster-scoped AWS identity for CAPA controller
# # AWSClusterControllerIdentity uses the secret in capa-system namespace
# # Unlike CAPZ's AzureClusterIdentity which supports namespace-scoped secrets
# apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
# kind: AWSClusterControllerIdentity
# metadata:
#   name: "default"
# spec:
#   allowedNamespaces: {}  # matches all namespaces
---
# Namespace-scoped AWS identity for ROSA cluster
# AWSClusterStaticIdentity allows namespace-scoped credentials (similar to CAPZ's AzureClusterIdentity)
apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
kind: AWSClusterStaticIdentity
metadata:
  name: "${CLUSTER_NAME}-account"
spec:
  secretRef: "${CLUSTER_NAME}-account-creds"
  allowedNamespaces:
    list:
      - "${NAMESPACE}"
# ---
# apiVersion: v1
# kind: Secret
# data:
#   credentials: ${AWS_CREDENTIALS}
# metadata:
#   name: capa-manager-bootstrap-credentials
#   namespace: ${CAPA_NAMESPACE}
---
# AWS credentials secret (in CAPA controller namespace)
# Contains both INI format (for ROSA SDK) and individual fields (for CAPA AWS session)
apiVersion: v1
kind: Secret
metadata:
  name: "${CLUSTER_NAME}-account-creds"
  namespace: ${CAPA_NAMESPACE}
type: Opaque
stringData:
  AccessKeyID: ${AWS_ACCESS_KEY_ID}
  SecretAccessKey: ${AWS_SECRET_ACCESS_KEY}
data:
  credentials: ${AWS_CREDENTIALS}
---
# OCM credentials for ROSA cluster management (namespace-scoped)
apiVersion: v1
kind: Secret
metadata:
  name: "${ROSA_CREDS_SECRET}"
  namespace: "${NAMESPACE}"
type: Opaque
data:
  ocmApiUrl: ${OCM_API_URL_BASE64}
  ocmClientID: ${OCM_CLIENT_ID_BASE64}
  ocmClientSecret: ${OCM_CLIENT_SECRET_BASE64}
